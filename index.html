<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Chat App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .chat-box, .notification-box {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 500px;
    }

    .chat-box h2, .notification-box h3 {
      margin-bottom: 15px;
      color: #333;
      text-align: center;
    }

    #messages, #notifications {
      list-style: none;
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      margin-bottom: 15px;
    }

    #messages li {
      background: #f1f3f6;
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      color: #333;
      word-wrap: break-word;
    }

    #notifications li {
      background: #fff4d6;
      padding: 10px 12px;
      margin-bottom: 10px;
      border-left: 5px solid #ffb703;
      border-radius: 10px;
      color: #444;
      font-size: 14px;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }

    #input:focus {
      border-color: #667eea;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5563d1;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }

      .chat-box, .notification-box {
        height: auto;
        min-height: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Chat Section -->
    <div class="chat-box">
      <h2>💬 Real-Time Chat</h2>
      <ul id="messages"></ul>

      <div class="input-area">
        <input id="input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- Notification Section -->
    <div class="notification-box">
      <h3>🔔 Notifications</h3>
      <ul id="notifications"></ul>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

  <script>
    const socket = io("http://localhost:3000");

    function sendMessage() {
      const input = document.getElementById("input");

      if (input.value.trim() !== "") {
        socket.emit("chat message", input.value);
        input.value = "";
      }
    }

    socket.on("chat message", (msg) => {
      const li = document.createElement("li");
      li.textContent = msg;
      document.getElementById("messages").appendChild(li);
    });

    // SSE connection
    const eventSource = new EventSource("http://localhost:3000/events");

    eventSource.onmessage = (event) => {
      const li = document.createElement("li");
      li.textContent = event.data;
      document.getElementById("notifications").appendChild(li);
    };
  </script>

</body>
</html>
